<select size="<{$ele_size}>" <{$ele_extra}><{if $ele_multiple}> name="<{$ele_name}>[]" id="<{$ele_name}>" multiple="multiple"<{else}> name="<{$ele_name}>" id="<{$ele_name}>"<{/if}>>

<{/foreach}>
</select>
