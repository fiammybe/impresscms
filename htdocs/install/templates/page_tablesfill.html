<{if $error}>
    <div class="alert alert-danger" style="color: #d32f2f; background-color: #ffebee; padding: 12px; border-radius: 4px; margin-bottom: 20px;">
        <strong>Error:</strong> <{$message}>
    </div>
<{else}>
    <p class="x2-note"><{$message}></p>
    <{if $content}>
        <div style="margin-top: 20px;">
            <{$content}>
        </div>
    <{/if}>
<{/if}>
