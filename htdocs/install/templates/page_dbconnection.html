<{if $error}>
    <div class="x2-note error"><{$error}></div>
<{/if}>

<h3><{$connectionLegend}></h3>
<div class="blokSQL">
    <div class="dbconn_line">
        <label>
            <{$databaseLegend}><br />
            <select size="2" name="DB_TYPE" class="db_select">
                <{foreach from=$connections item=option}>
                    <option value="<{$option.type}>"<{if $option.selected}> selected="selected"<{/if}>><{$option.name}></option>
                <{/foreach}>
            </select>
        </label>
        <div class='clear'>&nbsp;</div>
    </div>

    <div class="dbconn_line">
        <label for='DB_HOST'><{$dbHostLabel}></label>
        <{if $dbHostHelp}>
            <div class="xoform-help"><{$dbHostHelp}></div>
        <{/if}>
        <div class='clear'>&nbsp;</div>
        <input type='text' name='DB_HOST' id='DB_HOST' value='<{$dbHost}>' />
    </div>

    <div class="dbconn_line">
        <label for='DB_USER'><{$dbUserLabel}></label>
        <{if $dbUserHelp}>
            <div class="xoform-help"><{$dbUserHelp}></div>
        <{/if}>
        <div class='clear'>&nbsp;</div>
        <input type='text' name='DB_USER' id='DB_USER' value='<{$dbUser}>' />
    </div>

    <div class="dbconn_line">
        <label for='DB_PASS'><{$dbPassLabel}></label>
        <{if $dbPassHelp}>
            <div class="xoform-help"><{$dbPassHelp}></div>
        <{/if}>
        <div class='clear'>&nbsp;</div>
        <input type='password' name='DB_PASS' id='DB_PASS' value='<{$dbPass}>' />
    </div>
</div>

<label>
    <{$dbPconnectLabel}>
    <input class="checkbox" type="checkbox" name="DB_PCONNECT" value="1"
           onclick="alert('<{$dbPconnectHelps}>');"<{if $dbPconnect}> checked="checked"<{/if}> />
    <div class="xoform-help"><{$dbPconnectHelp}></div>
</label>
